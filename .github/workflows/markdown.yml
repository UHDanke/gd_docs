name: Process Markdown Files 
 
on:
  push:
    paths:
      - "data/tables/**"
      - "docs/**"
      - "scripts/mdgen.py"
  workflow_dispatch:
 
jobs:
  mdgen:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Processed markdown files')"
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
 
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
 
      - name: Run mdgen
        run: python scripts/mdgen.py
 
      - name: Commit updated markdown
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Processed markdown files"
          file_pattern: "docs/**"
 
