name: Generate Sidebar

on:
  push:
    paths:
      - "data/sidebar.csv"
      - "scripts/generate_sidebar.py"
  workflow_run:
    workflows: ["Populate Sidebar"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: generate
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate sidebar
        run: python scripts/generate_sidebar.py data/sidebar.csv > .vitepress/sidebar.mts

      - name: Commit sidebar
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "regenerate sidebar from CSV"
          file_pattern: ".vitepress/sidebar.mts"
