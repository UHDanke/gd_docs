name: Bugs CSV to Markdown

on:
  push:
    paths:
      - data/bug_list.csv
      - scripts/bugs_from_csv.py
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Convert CSV to Markdown
        run: python scripts/bugs_from_csv.py data/bug_list.csv docs/bugs/

      - name: Commit updated Markdown
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "updated bugs from csv to markdown"
          file_pattern: docs/bugs/*.md !docs/bugs/README.md
