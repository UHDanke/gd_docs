name: Populate Sidebar

on:
  push:
    paths:
      - docs/**
      - scripts/populate_sidebar.py
  workflow_dispatch:

jobs:
  populate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Populate sidebar CSV
        run: python scripts/populate_sidebar.py --docs docs --csv .data/sidebar.csv

      - name: Commit updated CSV
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "sync sidebar CSV from docs structure"
          file_pattern: .data/sidebar.csv
