name: Populate Sidebar

on:
  workflow_run:
    workflows: ["Process Markdown Files"]
    types:
      - completed
  push:
    paths:
      - "scripts/populate_sidebar.py"
  workflow_dispatch:

concurrency:
  group: populate
  cancel-in-progress: true

jobs:
  populate:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Populate sidebar CSV
        run: python scripts/populate_sidebar.py --docs docs --csv data/sidebar.csv

      - name: Commit updated CSV
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update sidebar CSV from docs"
          file_pattern: "data/sidebar.csv"
